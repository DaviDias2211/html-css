<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.p" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" autocomplete="name" placeholder="Nome completo" minlength="4" maxlength="30">
            </p>
            <p>
                <label for="iemail">Email</label>
                <input type="email" name="email"
                id="iemail" autocomplete="email" required placeholder="seunome@gmail.com">
            </p>
            <p>
                <label for="itel">Telefone</label>
                <input type="text" name="tel" id="itel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$"  autocomplete="tel" required placeholder="(xx)xxxx-xxxx">
            </p>
            <!--Estudar mais sobre RegEx-->
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </fieldset>
    </form>
</body>
</html>
