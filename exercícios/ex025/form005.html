<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemploe Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
           <fieldset>
                <legend>Sexo</legend>
                <input type="radio" name="sexo" id="isxmas"> <label for="isxmas">Masculino</label> <br>
                <input type="radio" name="sexo" id="isxfem"> <label for="isxfem">Feminino</label>
            </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="es" id="ies"> Futebol <br><label for="iesfut"></label>
            <input type="checkbox" name="esbas" id="iesbas"> Basquete <br><label for="iesbas"></label>
            <input type="checkbox" name="esvol" id="iesvol"> Volei <br> <label for="iesvol"></label>
            <input type="checkbox" name="esqmd" id="iesqmd"> Queimada <br> <label for="iesqmd"></label>
            <input type="checkbox" name="esnat" id="iesnat"> Natação <br> <label for="iesnat"></label>
            <input type="checkbox" name="escrd" id="iescrd"> Corrida <br> <label for="iesnat"></label>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
