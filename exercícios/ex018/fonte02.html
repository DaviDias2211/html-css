<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: Love Larry;
            src: url(font/love\ larry\ ttf.ttf) format(opentype), url(font/love\ larry\ ttf.ttf) format(truetype);
            font-weight: normal;
            font-style: normal; 
        }
        /*
              Tipos de format()
              - opentype (otf)
              - truetype (ttf)
              - embedded-opentype
              - truetype-aat (Apple advanced Typografy)
              -svg        
        */
        body{
            font-family:Arial, Helvetica, sans-serif
        }
        h1{
            font-family: 'Love Larry', Times, serif;
        }
    </style>
</head>
<body>
   <h1>Olá, mundo!</h1>
   <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptates iusto facere praesentium nisi error iure nulla at voluptate numquam omnis nobis fugiat consectetur, eaque eligendi aut dolore consequuntur enim aliquid.</p> 
</body>
</html>
